[features]
seeds = false
skip-lint = false

[programs.devnet]
swiflo_remittance_pool = "REPLACE_AFTER_DEPLOY"
swiflo_liquidity_vault = "REPLACE_AFTER_DEPLOY"
swiflo_rate_oracle     = "REPLACE_AFTER_DEPLOY"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet   = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
